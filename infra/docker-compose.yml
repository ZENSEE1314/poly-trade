version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oracle
      POSTGRES_PASSWORD: oracle
      POSTGRES_DB: oracle
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build: ../backend
    env_file: ../.env
    depends_on:
      db:   { condition: service_healthy }
      redis:{ condition: service_healthy }
    ports: ["8000:8000"]
    volumes:
      - model-data:/data

  worker:
    build: ../backend
    env_file: ../.env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    depends_on:
      api:  { condition: service_started }
      redis:{ condition: service_healthy }
    volumes:
      - model-data:/data

  beat:
    build: ../backend
    env_file: ../.env
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    depends_on:
      worker: { condition: service_started }

  frontend:
    build:
      context: ../frontend
      # VITE_API_BASE must be a build ARG when using Dockerfile.prod (Vite bakes it
      # at compile time). The runtime environment entry below covers the dev Dockerfile
      # (npm run dev reads it at server start).
      args:
        VITE_API_BASE: http://localhost:8000
    environment:
      VITE_API_BASE: http://localhost:8000
    ports: ["5173:5173"]
    depends_on: [api]

volumes:
  pgdata:
  model-data:
