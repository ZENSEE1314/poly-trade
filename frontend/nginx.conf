server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy all /api/* to the backend so the frontend can use relative URLs.
  # BACKEND_URL is injected at container start via envsubst (e.g. http://poly-trade.railway.internal:8080)
  location /api/ {
    proxy_pass ${BACKEND_URL}/api/;
    proxy_http_version 1.1;
    # Use $proxy_host (the upstream hostname) not $host (the client-facing hostname).
    # Railway's edge router matches requests by Host header; sending the frontend domain
    # to the backend service's public URL causes a 502. $proxy_host sends the correct value.
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # static assets — long cache
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
