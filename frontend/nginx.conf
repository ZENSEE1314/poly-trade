server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy all /api/* to the backend so the frontend can use relative URLs.
  # BACKEND_URL is injected at container start via envsubst (e.g. http://poly-trade.railway.internal:8080)
  location /api/ {
    proxy_pass ${BACKEND_URL}/api/;
    proxy_http_version 1.1;
    # $proxy_host sends the upstream hostname (not the client-facing domain).
    # proxy_ssl_server_name enables TLS SNI for the upstream connection — without it
    # Railway's edge rejects the handshake with "tlsv1 alert internal error" (alert 80)
    # because it can't route a TLS connection that has no server name indication.
    proxy_ssl_server_name on;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # static assets — long cache
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
